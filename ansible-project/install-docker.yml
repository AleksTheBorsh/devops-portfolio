---
- name: Установка официального Docker-CE (Спецоперация по спасению APT)
  hosts: webservers
  become: yes

  tasks:
    - name: 0. Спасаем APT (Принудительно удаляем все сломанные списки репозиториев Docker)
      shell: rm -f /etc/apt/sources.list.d/*docker*.list

    - name: 1. Удаление старых и конфликтующих пакетов
      apt:
        name: [docker.io, docker-doc, docker-compose, podman-docker, containerd, runc]
        state: absent
        update_cache: yes  # Заставляем APT обновить списки сразу после починки на Шаге 0

    - name: 2. Установка системных утилит
      apt:
        name: [ca-certificates, curl, gnupg]
        state: present

    - name: 3. Создание папки для ключей безопасности
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 4. Скачивание GPG ключа Docker напрямую
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: yes

    - name: 5. Добавление официального репозитория Docker (чистовик)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: yes

    - name: 6. Установка самой свежей версии Docker CE
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
        state: present

    - name: 7. Убеждаемся, что Docker запущен и добавлен в автозагрузку
      service:
        name: docker
        state: started
        enabled: yes
