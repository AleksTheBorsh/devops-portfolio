---
- name: установка Docker CE
  hosts: webservers
  become: yes

  tasks:
    - name: 1. Гарантируем отсутствие устаревших и конфликтующих пакетов
      apt:
        name: 
          - docker.io
          - docker-doc
          - docker-compose
          - podman-docker
          - containerd
          - runc
        state: absent

    - name: 2. Установка базовых зависимостей
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: 3. Создаем директорию для ключей (если ее нет)
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 4. Загружаем официальный GPG ключ Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: 5. Добавляем официальный репозиторий Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
        update_cache: yes

    - name: 6. Гарантируем наличие свежего Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: 7. Гарантируем, что служба запущена
      service:
        name: docker
        state: started
        enabled: yes
