apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-dep
  namespace: skate-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: external-svc
  namespace: skate-dev
spec:
  type: NodePort
  selector:
    app: web-server
  ports:
    - port: 80         # Внутренний порт самого сервиса
      targetPort: 80   # Порт внутри контейнера Nginx
      nodePort: 30080  # Тот самый открытый порт на физическом узле!
