name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  # Наша первая джоба (CI) - она осталась без изменений
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest ./flask-app

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest

  # Наша НОВАЯ джоба (CD) - Развертывание
  deploy:
    # Говорим: "Не начинай деплой, пока не выполнится сборка (build)"
    needs: build
    runs-on: self-hosted
    
    steps:
      # Используем готовый плагин для подключения по SSH
      - name: Deploy to VDS-2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Команды, которые выполнятся на твоем ВТОРОМ сервере:
          script: |
            # 1. Скачиваем свежий образ
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
            # 2. Останавливаем и удаляем старый контейнер (если он есть)
            docker stop my-app || true
            docker rm my-app || true
            # 3. Запускаем новый контейнер на 80 порту
            docker run -d -p 80:80 --name my-app ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
