name: Build and Push Docker Image

# Запускаем пайплайн автоматически при каждом пуше в ветку main
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # Говорим Гитхабу отдать эту задачу твоему серверу-раннеру
    runs-on: self-hosted

    steps:
      # Шаг 1: Раннер скачивает твой код из Гитхаба в свою скрытую папку _work
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Раннер логинится в твой Docker Hub, используя секреты из настроек
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Шаг 3: Раннер собирает образ из папки flask-app
      - name: Build Docker image
        # Формат: твой_логин/имя_репозитория:версия
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest ./flask-app

      # Шаг 4: Раннер загружает готовый образ в хранилище Docker Hub
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
