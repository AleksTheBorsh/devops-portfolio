name: Full-Cycle CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # ЭТАП 1: ТЕСТИРОВАНИЕ КОДА (Новый шаг)
  # ==========================================
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Проверка синтаксиса Python
        # Добавили флаг -u для проброса прав пользователя
        run: |
          docker run --rm -u $(id -u):$(id -g) -v ${{ github.workspace }}/flask-app:/app python:3.9-slim python -m py_compile /app/app.py

  # ==========================================
  # ЭТАП 2: СБОРКА И ОТПРАВКА В DOCKER HUB
  # ==========================================
  build:
    needs: test  # ВАЖНО: Не начинай сборку, пока не пройдена джоба 'test'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest ./flask-app

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest

  # ==========================================
  # ЭТАП 3: РАЗВЕРТЫВАНИЕ НА VDS-2
  # ==========================================
  deploy:
    needs: build  # ВАЖНО: Не начинай деплой, пока не пройдена джоба 'build'
    runs-on: self-hosted
    steps:
      - name: Deploy to VDS-2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 80:80 --name my-app ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
