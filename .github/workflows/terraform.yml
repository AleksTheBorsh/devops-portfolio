name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-project/**' # Пайплайн запустится, только если мы меняли файлы в этой папке

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    
    # Говорим GitHub выполнять все команды внутри папки проекта
    defaults:
      run:
        working-directory: ./terraform-project

    env:
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_SERVICE_ACCOUNT_KEY_FILE: key.json

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create SA key
        run: echo "${{ secrets.YC_SA_JSON_CREDENTIALS }}" > key.json

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="cloud_id=${YC_CLOUD_ID}" \
            -var="folder_id=${YC_FOLDER_ID}"

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="cloud_id=${YC_CLOUD_ID}" \
            -var="folder_id=${YC_FOLDER_ID}"
