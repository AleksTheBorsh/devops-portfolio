name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
    paths:
     - 'terraform-project/**' 
     - '.github/workflows/terraform.yml'
  # Добавляем ручной триггер (кнопку в интерфейсе GitHub Actions)
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action: apply or destroy'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    name: "Terraform Execution" # Переименовал, так как теперь тут не только Apply
    runs-on: ubuntu-latest
    
    # Говорим GitHub выполнять все команды внутри папки проекта
    defaults:
      run:
        working-directory: ./terraform-project

    env:
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      YC_SERVICE_ACCOUNT_KEY_FILE: key.json # <-- Имя файла, без секретов!
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }} 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Безопасная запись многострочного JSON через переменную окружения
      - name: Create SA key
        env:
          SA_KEY: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: echo "$SA_KEY" > key.json

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # Plan запускается при обычном пуше ИЛИ при ручном выборе 'apply'
      - name: Terraform Plan
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: |
          terraform plan \
            -var="cloud_id=${YC_CLOUD_ID}" \
            -var="folder_id=${YC_FOLDER_ID}" \
            -var="ssh_public_key=${SSH_PUBLIC_KEY}"

      # Apply запускается при обычном пуше ИЛИ при ручном выборе 'apply'
      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: |
          terraform apply -auto-approve \
            -var="cloud_id=${YC_CLOUD_ID}" \
            -var="folder_id=${YC_FOLDER_ID}" \
            -var="ssh_public_key=${SSH_PUBLIC_KEY}"

      # DESTROY запускается ТОЛЬКО если мы нажали кнопку руками и выбрали 'destroy'
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="cloud_id=${YC_CLOUD_ID}" \
            -var="folder_id=${YC_FOLDER_ID}" \
            -var="ssh_public_key=${SSH_PUBLIC_KEY}"